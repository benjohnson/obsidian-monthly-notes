name: Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run build

      - name: Read version from manifest
        id: version
        run: echo "version=$(jq -r .version manifest.json)" >> "$GITHUB_OUTPUT"

      # Attest provenance for the build artifacts before they're uploaded,
      # so users can cryptographically verify they came from this source.
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && steps.version.outputs.version || github.ref_name }}
          generate_release_notes: true
          files: |
            main.js
            manifest.json
